name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @admin/api db:deploy

      - name: Generate Prisma client
        run: pnpm --filter @admin/api db:generate

      - name: Lint code
        run: pnpm lint

      - name: Typecheck code
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        
      - name: Build project
        run: pnpm build
